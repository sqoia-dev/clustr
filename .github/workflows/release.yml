name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -timeout 120s

  build-client:
    name: Build client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o clonr-${{ matrix.goos }}-${{ matrix.goarch }} \
              ./cmd/clonr

      - name: SHA256 checksum
        run: sha256sum clonr-${{ matrix.goos }}-${{ matrix.goarch }} > clonr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            clonr-${{ matrix.goos }}-${{ matrix.goarch }}
            clonr-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  build-server:
    name: Build server (linux/amd64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${TAG}" \
            -o clonr-serverd-linux-amd64 \
            ./cmd/clonr-serverd

      - name: SHA256 checksum
        run: sha256sum clonr-serverd-linux-amd64 > clonr-serverd-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux-amd64
          path: |
            clonr-serverd-linux-amd64
            clonr-serverd-linux-amd64.sha256

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Client (static binary, runs in initramfs)
            ```sh
            curl -sL https://github.com/sqoia-dev/clonr/releases/download/${{ github.ref_name }}/clonr-linux-amd64 -o /usr/local/bin/clonr
            chmod +x /usr/local/bin/clonr
            ```

            ### Server
            ```sh
            curl -sL https://github.com/sqoia-dev/clonr/releases/download/${{ github.ref_name }}/clonr-serverd-linux-amd64 -o /usr/local/bin/clonr-serverd
            chmod +x /usr/local/bin/clonr-serverd
            ```
          files: |
            clonr-linux-amd64
            clonr-linux-amd64.sha256
            clonr-linux-arm64
            clonr-linux-arm64.sha256
            clonr-serverd-linux-amd64
            clonr-serverd-linux-amd64.sha256
