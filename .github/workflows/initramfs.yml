name: Initramfs

on:
  push:
    tags:
      - "v*"

jobs:
  build-initramfs:
    name: Build initramfs image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build static clonr client
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
              -ldflags="-s -w -X main.version=${TAG}" \
              -o bin/clonr \
              ./cmd/clonr

      - name: Build initramfs
        run: bash scripts/build-initramfs.sh

      - name: Attach initramfs to release
        uses: softprops/action-gh-release@v2
        with:
          append_body: false
          files: initramfs-clonr.img
