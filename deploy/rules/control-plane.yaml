# control-plane.yaml — Default alert rules for the clustr-serverd control-plane host.
#
# Installed by the RPM to /usr/share/clustr/rules/control-plane.yaml.
# Copied to /etc/clustr/rules.d/ on first boot (if absent) by pkg-postinstall.sh.
#
# All rules use match.host_role: control_plane so they only fire against the
# control-plane host metrics injected by the selfmon goroutine (#243).
# Existing cluster-node rules default to host_role: cluster_node and are
# unaffected by this file.

---
name: cp.disk.root.warn
description: "Control-plane rootfs used > 85%"
plugin: disks
sensor: used_pct
labels:
  mount: "/"
match:
  host_role: control_plane
threshold:
  op: ">="
  value: 85
duration: 300s
severity: warn
notify:
  webhook: true
  email: []

---
name: cp.disk.root.crit
description: "Control-plane rootfs used > 95%"
plugin: disks
sensor: used_pct
labels:
  mount: "/"
match:
  host_role: control_plane
threshold:
  op: ">="
  value: 95
duration: 60s
severity: critical
notify:
  webhook: true
  email: []

---
name: cp.disk.data.warn
description: "clustr data volume (/var/lib/clustr) used > 85%"
plugin: disks
sensor: used_pct
labels:
  mount: "/var/lib/clustr"
match:
  host_role: control_plane
threshold:
  op: ">="
  value: 85
duration: 300s
severity: warn
notify:
  webhook: true
  email: []

---
name: cp.disk.data.crit
description: "clustr data volume (/var/lib/clustr) used > 95%"
plugin: disks
sensor: used_pct
labels:
  mount: "/var/lib/clustr"
match:
  host_role: control_plane
threshold:
  op: ">="
  value: 95
