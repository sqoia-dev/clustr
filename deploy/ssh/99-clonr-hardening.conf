# clonr-server SSH hardening drop-in
# Drop into /etc/ssh/sshd_config.d/99-clonr-hardening.conf
# Applied via deploy/ssh/ — do not edit on-host directly.
#
# Security intent:
#   - Key-only auth for all users including root (no password brute-force surface)
#   - Root login allowed only via key (prohibit-password) — needed for provisioning ops
#   - Reduce auth window and retry budget to limit exposure from slow-loris attacks
#   - No X11 forwarding — this is a headless provisioning server, no GUI needed

PermitRootLogin prohibit-password
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
X11Forwarding no
MaxAuthTries 3
LoginGraceTime 20
