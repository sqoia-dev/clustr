<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clonr — Set Password</title>
    <link rel="stylesheet" href="/ui/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%233b82f6'/><text x='5' y='23' font-size='20' font-family='monospace' font-weight='bold' fill='white'>c</text></svg>">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .sp-wrap { width: 100%; max-width: 420px; padding: 0 16px; }
        .sp-logo {
            display: flex; align-items: center; gap: 12px;
            justify-content: center; margin-bottom: 32px;
        }
        .sp-logo-mark {
            width: 36px; height: 36px; background: var(--accent);
            border-radius: 9px; display: flex; align-items: center;
            justify-content: center; color: white;
        }
        .sp-logo-mark svg { width: 20px; height: 20px; }
        .sp-logo-text { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
        .sp-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-md);
        }
        .sp-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .sp-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .sp-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .sp-field label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
        .sp-field input {
            width: 100%; padding: 9px 12px; border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-size: 13px;
            background: var(--bg-input); color: var(--text-primary);
            outline: none; transition: border-color var(--transition); box-sizing: border-box;
        }
        .sp-field input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        .sp-hint { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .sp-btn { width: 100%; justify-content: center; padding: 10px 16px; font-size: 14px; }
        .sp-error {
            display: none; margin-top: 12px; padding: 10px 14px;
            border-radius: var(--radius-sm); background: var(--error-bg);
            color: var(--error-text); font-size: 13px; border: 1px solid #fca5a5;
        }
        .sp-error.visible { display: block; }
        .sp-banner {
            background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.3);
            border-radius: var(--radius-sm); padding: 10px 14px;
            font-size: 13px; color: var(--text-primary); margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="sp-wrap">
    <div class="sp-logo">
        <div class="sp-logo-mark">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            </svg>
        </div>
        <div class="sp-logo-text">clonr</div>
    </div>

    <div class="sp-card">
        <div class="sp-title">Set a new password</div>
        <div class="sp-banner">
            For security, you must change the default password before continuing.
        </div>

        <form id="sp-form" autocomplete="off">
            <div class="sp-field">
                <label for="current-password">Current password</label>
                <input id="current-password" type="password" autocomplete="current-password" required autofocus>
            </div>

            <div class="sp-field">
                <label for="new-password">New password</label>
                <input id="new-password" type="password" autocomplete="new-password" required minlength="8">
                <div class="sp-hint">Minimum 8 characters. Passwords beyond 72 characters are silently truncated by bcrypt.</div>
            </div>

            <div class="sp-field">
                <label for="confirm-password">Confirm new password</label>
                <input id="confirm-password" type="password" autocomplete="new-password" required minlength="8">
            </div>

            <button type="submit" class="btn btn-primary sp-btn" id="sp-btn">Set password</button>
            <div class="sp-error" id="sp-error"></div>
        </form>
    </div>
</div>

<script>
(function () {
    const form    = document.getElementById('sp-form');
    const curEl   = document.getElementById('current-password');
    const newEl   = document.getElementById('new-password');
    const conEl   = document.getElementById('confirm-password');
    const btn     = document.getElementById('sp-btn');
    const errEl   = document.getElementById('sp-error');

    function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.add('visible');
    }
    function clearError() {
        errEl.classList.remove('visible');
        errEl.textContent = '';
    }

    // If the force-change cookie is not set, redirect to main app.
    // (Handles direct navigation to /set-password after password already changed.)
    function readCookie(name) {
        return document.cookie.split(';').some(c => c.trim().startsWith(name + '='));
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const current = curEl.value;
        const newPw   = newEl.value;
        const confirm = conEl.value;

        if (newPw.length < 8) {
            showError('Password must be at least 8 characters.');
            return;
        }
        if (newPw !== confirm) {
            showError('Passwords do not match.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving\u2026';

        try {
            const resp = await fetch('/api/v1/auth/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: current, new_password: newPw }),
                credentials: 'same-origin',
            });

            if (resp.ok) {
                window.location.href = '/';
                return;
            }

            let msg = 'Failed to set password.';
            try {
                const body = await resp.json();
                if (body && body.error) msg = body.error;
            } catch (_) {}
            showError(msg);
        } catch (err) {
            showError('Network error \u2014 could not reach the server.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Set password';
        }
    });
}());
</script>
</body>
</html>
